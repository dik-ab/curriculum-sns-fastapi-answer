name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build check
        run: python -m compileall app tests

      - name: Unit tests
        run: pytest
